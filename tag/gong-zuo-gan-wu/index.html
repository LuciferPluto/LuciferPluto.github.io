<h2 id="heading">组合按键</h2>
<p>Emacs中大量的按键操作都是各式各样的组合按键（快捷键），下面是几种通常的约定：</p>
<ul>
<li>Ctrl键：表示为C</li>
<li>Alt键：表示为M</li>
<li>Shift键：表示为S</li>
<li>组合按键：比如向下移动一行的组合按键是Ctrl+n，就表示为：C-n，其含义表示同时按下键盘上的Ctrl和n键。</li>
</ul>
